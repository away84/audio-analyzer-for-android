name: Build APK

on:
  workflow_dispatch: # 允许手动点击按钮触发

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: 下载源码
      uses: actions/checkout@v4

    - name: 配置 Java 环境
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: 给予执行权限
      run: chmod +x gradlew

    - name: 开始构建 APK
      run: ./gradlew assembleDebug

    - name: 上传 APK 文件
      uses: actions/upload-artifact@v4
      with:
        name: AudioAnalyzer-APK
        path: audioSpectrumAnalyzer/build/outputs/apk/debug/AudioAnalyzer.apk
